syntax = "proto3";
package agent;

import "agent/handshake/connection.proto";
import "agent/handshake/authentication.proto";
import "agent/payload/message.proto";

message AgentPacket {
    oneof packet {
        handshake.AgentRequestConnection agent_request_connection = 1;
        handshake.AgentAuthenticate agent_authenticate = 2;
        payload.AgentMessage agent_message = 3;
    }
}