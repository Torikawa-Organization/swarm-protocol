syntax = "proto3";
package agent.handshake;

message AgentRequestEncryption {
    bytes publicKey = 1;
}

message ServerResponseEncryption {
    bytes publicKey = 1;
}

message ServerRequestChallenge {
    bytes challenge = 1;
}

message AgentResponseChallenge {
    bytes response = 1;
}

enum ServerResponseChallengeStatus {
    SERVER_RESPONSE_CHALLENGE_STATUS_UNSPECIFIED = 0;
    SERVER_RESPONSE_CHALLENGE_STATUS_SUCCESS = 1;
    SERVER_RESPONSE_CHALLENGE_STATUS_FAILURE = 2;
}

message ServerResponseChallenge {
    ServerResponseChallengeStatus status = 1;
}