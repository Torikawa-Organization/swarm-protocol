syntax = "proto3";
package agent.handshake;

enum ServerResponseConnectionStatus {
    SERVER_RESPONSE_CONNECTION_STATUS_UNSPECIFIED = 0;
    SERVER_RESPONSE_CONNECTION_STATUS_ACCEPTED = 1;
    SERVER_RESPONSE_CONNECTION_STATUS_REJECTED = 2;
}

enum ServerResponseConnectionError {
    SERVER_RESPONSE_CONNECTION_ERROR_UNSPECIFIED = 0;
    SERVER_RESPONSE_CONNECTION_ERROR_FAILED_TO_PARSE = 1;
    SERVER_RESPONSE_CONNECTION_ERROR_UNSUPPORTED_PROTOCOL_VERSION = 2;
}

message ServerResponseConnection {
    ServerResponseConnectionStatus status = 1;
    ServerResponseConnectionError error = 2;
}

enum ServerResponseAuthenticationStatus {
    SERVER_RESPONSE_AUTHENTICATION_STATUS_UNSPECIFIED = 0;
    SERVER_RESPONSE_AUTHENTICATION_STATUS_SUCCESS = 1;
    SERVER_RESPONSE_AUTHENTICATION_STATUS_FAILURE = 2;
}

message ServerResponseAuthentication {
    ServerResponseAuthenticationStatus status = 1;
}

message ServerHandshakePacket {
    oneof packet {
        ServerResponseConnection server_response_connection = 1;
        ServerResponseAuthentication server_response_authentication = 2;
    }
}
