syntax = "proto3";
package agent.handshake;

message ServerResponseConnectionSuccess {}

enum ServerResponseConnectionError {
    SERVER_RESPONSE_CONNECTION_ERROR_UNSPECIFIED = 0;
    SERVER_RESPONSE_CONNECTION_ERROR_FAILED_TO_READ = 1;
    SERVER_RESPONSE_CONNECTION_ERROR_FAILED_TO_PARSE = 2;
    SERVER_RESPONSE_CONNECTION_ERROR_UNSUPPORTED_PROTOCOL_VERSION = 3;
}

message ServerResponseConnection {
    oneof inner {
        ServerResponseConnectionSuccess success = 1;
        ServerResponseConnectionError error = 2;
    }
}

message ServerHandshakePacket {
    oneof inner {
        ServerResponseConnection server_response_connection = 1;
    }
}
