syntax = "proto3";
package agent;

import "agent/handshake/connection.proto";
import "agent/handshake/authentication.proto";
import "agent/payload/message.proto";

message ServerPacket {
    oneof packet {
        handshake.ServerResponseConnection server_response_connection = 1;
        handshake.ServerResponseAuthentication server_response_authentication = 2;
        payload.ServerMessage server_message = 3;
    }
}